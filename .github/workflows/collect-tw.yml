name: Collect Taiwan Environment Data

on:
  schedule:
    - cron: "15,45 * * * *"  # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Collect Taiwan AQI + Reservoir data
        run: python collect_tw.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tw_aqi.json data/tw_reservoir.json || true
          git diff --cached --quiet || git commit -m "data: tw env $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase || true
          git push || true
